<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11171a"/>
      <stop offset="100%" stop-color="#0a0e12"/>
    </linearGradient>
    <linearGradient id="grn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#56d364"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>
  </defs>

  <!-- app squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#bg)"/>
  <rect x="8" y="8" width="1008" height="1008" rx="226" ry="226" fill="none" stroke="#1f2a24" stroke-width="4"/>

  <!-- terminal prompt chevron ">" -->
  <path d="M300 332 L520 512 L300 692"
        fill="none" stroke="url(#grn)" stroke-width="78"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- the posse: three agents gathered to the right of the prompt -->
  <circle cx="616" cy="512" r="46" fill="#3fb950"/>
  <circle cx="742" cy="512" r="46" fill="#56d364"/>
  <circle cx="660" cy="640" r="38" fill="#2ea043" opacity="0.9"/>

  <!-- cursor baseline underscore -->
  <rect x="300" y="744" width="300" height="40" rx="20" fill="#3fb950" opacity="0.55"/>
</svg>
