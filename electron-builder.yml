appId: com.duocli.app
productName: DuoCLI
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
  icon: build/icon.icns
files:
  - dist/**/*
  - node_modules/**/*
  - "!node_modules/.cache"
asar: true
asarUnpack:
  - "node_modules/sharp/**/*"
  - "node_modules/@img/**/*"
directories:
  output: release
